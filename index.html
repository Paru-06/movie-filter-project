<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Filter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Latest Tamil Movies (2025)</h1>
        
        <div class="filters">
            <button class="chip active" id="all" onclick="resetFilters()">All</button>
            <div id="genre-filters" class="filter-group"></div>
            <div id="rating-filters" class="filter-group"></div>
            <div id="year-filters" class="filter-group"></div>
        </div>
        
        <div id="movie-list" class="movie-grid"></div>
    </div>

    <script src="movies.js"></script>
    <script src="script.js"></script>
</body>
</html>
